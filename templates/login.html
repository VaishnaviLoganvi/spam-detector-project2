<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>

<body>

<div class="login-box">

<h1>Login</h1>

<form action="/login" method="post">

<input type="text"
name="username"
placeholder="Username">

<input type="password"
name="password"
placeholder="Password">

<button>Login</button>

</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
